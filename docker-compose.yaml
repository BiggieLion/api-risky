services:
  credits:
    build: 
      context: .
      dockerfile: ./apps/credits/Dockerfile
      target: development
    command: pnpm run start:dev credits
    env_file:
      - ./apps/credits/.env
    ports:
      - '3000:3000'
    volumes:
      - .:/usr/src/app

  auth:
    build:
      context: .
      dockerfile: ./apps/auth/Dockerfile
      target: development
    command: pnpm run start:dev auth
    env_file:
      - ./apps/auth/.env
    ports:
      - '3001:3001'
    volumes:
      - .:/usr/src/app

  notifications:
    build: 
      context: .
      dockerfile: ./apps/notifications/Dockerfile
      target: development
    command: pnpm run start:dev notifications
    env_file:
      - ./apps/notifications/.env
    volumes:
      - .:/usr/src/app

  # documents:
  #   build: 
  #     context: .
  #     dockerfile: ./apps/documents/Dockerfile
  #     target: development
  #   command: pnpm run start:dev documents
  #   env_file:
  #     - ./apps/documents/.env
  #   volumes:
  #     - .:/usr/src/app

  mongo:
    image: mongo
    ports:
      - '27017:27017'